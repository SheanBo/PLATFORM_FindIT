version: '3.8'

services:
  # Backend API service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: findit-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_PATH: ./database/findit.db
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-here}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      UPLOAD_DIR: ./uploads
    ports:
      - "5000:5000"
    volumes:
      - ./backend/database:/app/database
      - ./backend/uploads:/app/uploads
    networks:
      - findit-network
    depends_on:
      - smtp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Nginx reverse proxy & static file server
  nginx:
    image: nginx:alpine
    container_name: findit-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/uploads:/usr/share/nginx/html/uploads:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - findit-network
    depends_on:
      - backend
    restart: unless-stopped

  # Mailhog for email testing (development)
  smtp:
    image: mailhog/mailhog:latest
    container_name: findit-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - findit-network
    restart: unless-stopped

  # Redis for caching (optional, for future enhancement)
  redis:
    image: redis:7-alpine
    container_name: findit-redis
    ports:
      - "6379:6379"
    networks:
      - findit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  findit-network:
    driver: bridge

volumes:
  database:
  uploads:
